[package]
name = "jarvis_node"
version = "0.0.0"
edition = "2021"
rust-version = "1.84"
description = "Single-node runtime for the Jarvis Engine (bootstrap skeleton)."
license = "Apache-2.0 OR MIT"
publish = false

[lib]
name = "jarvis_node"
path = "src/lib.rs"

[[bin]]
name = "node-run"
path = "src/bin/node_run.rs"

[features]
# Default build is network-free: no `reqwest`, no live model adapters.
# JAR2-14 lands the `ModelClient` trait + a hand-rolled Anthropic impl
# behind this opt-in feature so `cargo test` stays hermetic by default.
default = []
llm-anthropic = ["dep:reqwest"]

[dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
hex = "0.4"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "sync"] }
tracing = "0.1"
ulid = { version = "1", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
# `test-util` enables `tokio::time::pause`/`advance` and the `start_paused`
# attribute on `#[tokio::test]`, used by the scheduler's deterministic
# time-travel tests (JAR2-5).
tokio = { version = "1", features = ["test-util"] }
