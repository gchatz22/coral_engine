[package]
name = "jarvis_node"
version = "0.0.0"
edition = "2021"
rust-version = "1.84"
description = "Single-node runtime for the Jarvis Engine (bootstrap skeleton)."
license = "Apache-2.0 OR MIT"
publish = false

[lib]
name = "jarvis_node"
path = "src/lib.rs"

[[bin]]
name = "node-run"
path = "src/bin/node_run.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "sync"] }
ulid = { version = "1", features = ["serde"] }
