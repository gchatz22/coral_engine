# Single-file fixture for the MCP-on-the-workflow-path smoke. One agent
# whose only tool is an MCP server (`@modelcontextprotocol/server-everything`,
# the same free reference server the in-process smokes use). The worker
# reads this tool from the structural DB and builds the agent's per-graph
# registry by spawning the server — proving `kind: mcp` works end-to-end
# through `coral apply` → DB → worker dispatch.
apiVersion: coral.engine/v1alpha1
kind: Graph
metadata:
  name: smoke-mcp-temporal
  description: |
    Fixture for the MCP workflow-path smoke. One agent calls the MCP
    server's `get-sum` tool, emits a cited output, retires.
tools:
  # The tool `id` is the operator's handle; the model calls tools by the
  # server's own advertised names (e.g. `get-sum`), not by this id. The
  # version is pinned so the run is reproducible (matches CI's pin).
  - id: everything
    kind: mcp
    command: npx
    args: ["-y", "@modelcontextprotocol/server-everything@2026.1.26"]
agents:
  - id: root
    mandate:
      text: "Your task: call the `get-sum` tool exactly once with arguments {\"a\": 2, \"b\": 3}, then on the next tick emit an Output via the `emit_output` decision whose `content` is a short summary citing the resulting evidence id, then retire. Do not call any other tool; do not loop; do not idle except as a last resort."
      idle_period: 1s
    tools: [everything]
seed:
  triggers:
    - agent: root
      at: start
      external:
        kind: kickoff
        payload: {}
