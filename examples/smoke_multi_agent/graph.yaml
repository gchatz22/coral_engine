# Multi-agent fixture: parent + 2 children with a deliberate disagreement
# on the same claim. Smallest shape that exercises spawn, child→parent
# signaling, reconcile + synthetic evidence, and conflict-log writing.
#
#   root
#   ├── child-a   (emits claim "X")
#   └── child-b   (emits claim "NOT-X")
#
# Each agent uses an empty `tools:` list — `MockDecide` scripts the entire
# decision sequence; no tool dispatch is needed for the topology / signal
# / reconciliation / conflict-log assertions this fixture's integration
# test makes. The top-level `tools:` list carries a single `echo`
# registration because every YAML must declare a `tools:` block, but no
# agent references it.
#
# Mandate text is intentionally short — not a content test. The
# `mandate.text` strings (`multi-agent-parent`, `multi-agent-child-a`,
# `multi-agent-child-b`) discriminate which scripted role each agent
# plays at decide time.
apiVersion: jarvis.engine/v1alpha1
kind: Graph
metadata:
  name: smoke-multi-agent
  description: |
    Multi-agent integration smoke fixture. Parent + 2 children +
    scripted disagreement. Drives spawn → child→parent signal →
    reconcile + synthetic evidence → conflict-log writer end-to-end.
    MockDecide throughout — no live LLM.
defaults:
  idle_period: 100ms
tools:
  # Required by the schema (at least one `tools[]` entry is conventional
  # for non-trivial fixtures). Unused by any agent below — MockDecide
  # scripts cover every decision and no agent emits CallTools.
  - id: echo
    kind: builtin
    builtin: echo
agents:
  - id: root
    mandate:
      text: multi-agent-parent
    tools: []
    children:
      - id: child-a
        mandate:
          text: multi-agent-child-a
        tools: []
      - id: child-b
        mandate:
          text: multi-agent-child-b
        tools: []
seed:
  triggers:
    - agent: root
      at: start
      external:
        kind: kickoff
        payload: {}
