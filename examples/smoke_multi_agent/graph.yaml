# Stage 5.9 (JAR2-86) — Multi-agent fixture: parent + 2 children with a
# deliberate disagreement on the same claim.
#
# Topology (mirrors `scratch/graph_yaml_schema.md` § 3 strawman, trimmed
# to the smallest shape that exercises 5.3 spawn → 5.4 child→parent
# signal → 5.5 reconcile → 5.6 conflict-log + cross-agent FS read):
#
#   root
#   ├── child-a   (emits claim "X")
#   └── child-b   (emits claim "NOT-X")
#
# Each agent uses an empty `tools:` list — `MockDecide` scripts the
# entire decision sequence; no tool dispatch is needed for the
# topology / signal-path / reconciliation / conflict-log assertions
# this fixture's integration test makes. (The top-level `tools:` list
# below carries a single `echo` registration because every YAML must
# declare a `tools:` block, but no agent references it.)
#
# Mandate text is intentionally short — this is not a content test.
# The `mandate.text` strings the `RoutingDecide` in the integration
# test uses (`JAR2-86-parent`, `JAR2-86-child-a`, `JAR2-86-child-b`)
# discriminate which scripted role each agent plays at decide time.
apiVersion: jarvis.engine/v1alpha1
kind: Graph
metadata:
  name: smoke-multi-agent
  description: |
    Stage 5.9 fixture for the multi-agent integration smoke. Parent +
    2 children + scripted disagreement. Drives 5.3 spawn → 5.4
    child→parent signal → 5.5 reconcile + synthetic evidence → 5.6
    conflict-log writer end-to-end. MockDecide throughout — no live
    LLM (Stage 5 Project decision 11 + ticket-baked decision).
defaults:
  idle_period: 100ms
tools:
  # Required by the schema (at least one `tools[]` entry is conventional
  # for non-trivial fixtures). Unused by any agent below — MockDecide
  # scripts cover every decision and no agent emits CallTools.
  - id: echo
    kind: builtin
    builtin: echo
agents:
  - id: root
    mandate:
      text: JAR2-86-parent
    tools: []
    children:
      - id: child-a
        mandate:
          text: JAR2-86-child-a
        tools: []
      - id: child-b
        mandate:
          text: JAR2-86-child-b
        tools: []
seed:
  triggers:
    - agent: root
      at: start
      external:
        kind: kickoff
        payload: {}
