# Single-file fixture for the workflow-driven smoke. Encodes one agent
# with a mandate that asks the model to call `echo` once, then emit an
# Output citing the resulting evidence id, then retire.
apiVersion: coral.engine/v1alpha1
kind: Graph
metadata:
  name: smoke-llm-temporal
  description: |
    Fixture for the workflow-driven smoke. One agent, one tool call,
    one cited output, retire.
tools:
  - id: echo
    kind: builtin
    builtin: echo
agents:
  - id: root
    mandate:
      text: "Your task: call the `echo` tool exactly once with arguments {\"msg\": \"hello from temporal\"}, then on the next tick emit an Output via the `emit_output` decision whose `content` is a short summary citing the resulting evidence id, then retire. Do not call any other tool; do not loop; do not idle except as a last resort."
      idle_period: 1s
    tools: [echo]
seed:
  triggers:
    - agent: root
      at: start
      external:
        kind: kickoff
        payload: {}
