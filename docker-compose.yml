# Local Docker dev environment for the Coral Engine.
#
# Scope: bring up backing services (Temporal Server + UI, Postgres) and
# build (but do not run) a worker container scaffold. The recommended dev
# loop runs the worker natively (`cargo run -p coral_worker --bin
# worker`) against these containerized services — see README "Dev
# environment" section.
#
# Dev-only: `temporalio/auto-setup` bundles all Temporal services into
# one container for simplicity. Postgres here hosts both Temporal's
# persistence (databases `temporal` + `temporal_visibility`, created by
# auto-setup) and the structural DB (`coral_structural`, created by an
# init script). One Postgres in dev keeps the stack light.

name: coral

networks:
  coral:
    driver: bridge

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16-alpine3.23
    container_name: coral-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coral
      POSTGRES_PASSWORD: coral
      # Default DB the structural-DB schema owns. Temporal creates its
      # own `temporal` + `temporal_visibility` DBs at startup.
      POSTGRES_DB: coral_structural
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - coral
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coral -d coral_structural"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.29.6
    container_name: coral-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: coral
      POSTGRES_PWD: coral
      POSTGRES_SEEDS: postgres
      # `default` namespace is created by auto-setup. Skip schema setup
      # only if already present (auto-setup handles this internally).
    ports:
      - "7233:7233"  # gRPC frontend (workers connect here)
    networks:
      - coral
    healthcheck:
      # `temporal` CLI ships inside the auto-setup image. `operator
      # cluster health` exits non-zero until the frontend is accepting
      # requests. (`tctl` also exists but is deprecated as of late 2025.)
      test: ["CMD-SHELL", "temporal operator cluster health --address temporal:7233 | grep -q SERVING"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.50.0
    container_name: coral-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8233
    ports:
      - "8233:8080"  # UI on http://localhost:8233
    networks:
      - coral

  worker:
    # Worker container scaffold. Built but not started by default — the
    # recommended dev loop runs the worker natively via `cargo run`.
    # Bring it up explicitly with `docker compose --profile container-worker up worker`.
    image: coral-worker:dev
    container_name: coral-worker
    build:
      context: .
      dockerfile: crates/coral_worker/Dockerfile
    profiles: ["container-worker"]
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # In-container worker reaches services by their compose name, not
      # localhost. `.env.example` has the host-network equivalents for
      # the recommended native-worker dev loop.
      DATABASE_URL: postgres://coral:coral@postgres:5432/coral_structural
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: default
      AGENT_FS_ROOT: /agent-fs
      RUST_LOG: info
      # The image compiles both LLM providers; the registry boots from
      # whichever API keys are supplied here. Without any key the worker
      # exits at boot on Decide setup.
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # COHERE_API_KEY: ${COHERE_API_KEY:-}
    volumes:
      - ./agent-fs:/agent-fs
    networks:
      - coral
