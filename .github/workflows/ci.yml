name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Pinned MCP reference server for mcp-smoke and runbook-smoke. The smoke_mcp
  # fixture's hardcoded evidence id (10c78548…) was computed against this
  # version; bumping requires recomputing that sha.
  MCP_SERVER_EVERYTHING_VERSION: "2026.1.26"

jobs:
  lint-and-test:
    name: build / clippy / fmt / test
    runs-on: ubuntu-latest
    # `coral_graph`'s `#[sqlx::test]` cases need live Postgres at runtime;
    # build stays DB-free via the committed `.sqlx/` offline cache.
    services:
      postgres:
        image: postgres:16-alpine3.23
        env:
          POSTGRES_USER: coral
          POSTGRES_PASSWORD: coral
          POSTGRES_DB: coral_structural
        ports:
          - 5432:5432
        # `sqlx::test` creates ephemeral per-test databases, so the connected
        # role needs CREATEDB — the superuser bound to POSTGRES_USER has it.
        options: >-
          --health-cmd "pg_isready -U coral -d coral_structural"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://coral:coral@localhost:5432/coral_structural
      # Job-scope `SQLX_OFFLINE=true` forces every cargo invocation through the
      # `.sqlx/` cache for compile-time query!/query_as! checks; `#[sqlx::test]`
      # still uses DATABASE_URL at runtime to hit the service container.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      # `temporalio-sdk` pulls `prost-wkt-types`, which needs `protoc` at build time.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  feature-matrix:
    name: feature matrix
    runs-on: ubuntu-latest
    # `--workspace` tests include `coral_graph`'s `#[sqlx::test]` cases, which
    # need live Postgres at runtime; build stays DB-free via the `.sqlx/` cache.
    services:
      postgres:
        image: postgres:16-alpine3.23
        env:
          POSTGRES_USER: coral
          POSTGRES_PASSWORD: coral
          POSTGRES_DB: coral_structural
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coral -d coral_structural"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://coral:coral@localhost:5432/coral_structural
      # Job-scope `SQLX_OFFLINE=true` routes compile-time query checks through
      # the `.sqlx/` cache; `#[sqlx::test]` still hits DATABASE_URL at runtime.
      SQLX_OFFLINE: "true"
    strategy:
      matrix:
        include:
          - features: "coral_node/llm-anthropic"
            name: "llm-anthropic"
          - features: "coral_node/llm-cohere"
            name: "llm-cohere"
          - features: "coral_node/mcp"
            name: "mcp"
          - features: "coral_node/llm-anthropic,coral_node/llm-cohere,coral_node/mcp"
            name: "all features"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # Features live on `coral_node`, not the workspace; cross-crate selection
      # from workspace-aware invocations requires the `<crate>/<feature>` form.
      - name: cargo build [${{ matrix.name }}]
        run: cargo build --workspace --all-targets --locked --features "${{ matrix.features }}"

      - name: cargo test [${{ matrix.name }}]
        run: cargo test --workspace --all-targets --locked --features "${{ matrix.features }}"

  mcp-smoke:
    # Activates tests/smoke_mcp_server_everything.rs, which is gated behind
    # CORAL_SMOKE_MCP=1 and needs Node + a pinned server-everything on the runner.
    name: mcp smoke (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke_mcp_server_everything against pinned server
        env:
          CORAL_SMOKE_MCP: "1"
          CORAL_SMOKE_MCP_CMD: "npx -y @modelcontextprotocol/server-everything@${{ env.MCP_SERVER_EVERYTHING_VERSION }}"
        run: |
          mkdir -p ci-logs
          set -o pipefail
          cargo test -p coral_node --features mcp --test smoke_mcp_server_everything --locked -- --nocapture \
            2>&1 | tee ci-logs/mcp-smoke.log

      - name: Upload mcp-smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-smoke-logs
          path: ci-logs/

  runbook-smoke:
    # Drives the user-facing runbook binaries (node-run + node-run-mcp) against
    # their committed fixtures and asserts on the durable artifacts they
    # produce (retirement.json, evidence/<sha>.json, outputs/<ulid>.json).
    name: runbook binary smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run node-run against examples/smoke fixture
        run: |
          mkdir -p ci-logs
          set -o pipefail
          cargo run --locked -p coral_node --bin node-run -- \
            examples/smoke/config.json \
            examples/smoke/triggers.jsonl \
            "${RUNNER_TEMP}/coral-smoke-fs" \
            2>&1 | tee ci-logs/node-run.log

      - name: Assert node-run artifacts
        run: |
          bash scripts/ci/assert_smoke.sh \
            "${RUNNER_TEMP}/coral-smoke-fs" \
            "1d6a153a69d110156ca44ed281f859ca09d9875747e3ed16b9964c52632fd96e" \
            "echo" \
            '{"hello":"smoke"}' \
            "smoke test passed"

      - name: Run node-run-mcp against examples/smoke_mcp fixture
        run: |
          set -o pipefail
          cargo run --locked -p coral_node --features coral_node/mcp --bin node-run-mcp -- \
            examples/smoke_mcp/config.json \
            examples/smoke_mcp/triggers.jsonl \
            "${RUNNER_TEMP}/coral-smoke-mcp-fs" \
            -- npx -y "@modelcontextprotocol/server-everything@${MCP_SERVER_EVERYTHING_VERSION}" \
            2>&1 | tee ci-logs/node-run-mcp.log

      - name: Assert node-run-mcp artifacts
        run: |
          bash scripts/ci/assert_smoke.sh \
            "${RUNNER_TEMP}/coral-smoke-mcp-fs" \
            "10c7854829677f9d39acaafa5aa5ae4e9fa59ae5cba2a1dafc941c4c9f4938de" \
            "get-sum" \
            '{"a":2,"b":3}' \
            "get-sum(2, 3) via MCP server-everything"

      - name: Upload runbook smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runbook-smoke-artifacts
          path: |
            ci-logs/
            ${{ runner.temp }}/coral-smoke-fs/
            ${{ runner.temp }}/coral-smoke-mcp-fs/

  temporal-workflow-smoke:
    # Workflow-driven smoke against `temporal server start-dev`: drives
    # `AgentWorkflow` end-to-end through Idle → CallTools(echo) → EmitOutput →
    # Retire and asserts the same three durable artifacts `node-run-llm`
    # produces in-process (outputs, retirement, decisions). Scripted-Decide,
    # hermetic — no LLM keys required. Live-vendor verification stays manual
    # via `coral apply` against a worker daemon with vendor credentials.
    name: temporal workflow smoke (live)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Live tests write to the structural DB via `register_child_in_structural_db`
    # and the YAML walker, so a real Postgres is needed at runtime; schema is
    # migrated by `sqlx::migrate!` in test setup.
    services:
      postgres:
        image: postgres:16-alpine3.23
        env:
          POSTGRES_USER: coral
          POSTGRES_PASSWORD: coral
          POSTGRES_DB: coral_structural
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coral -d coral_structural"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://coral:coral@localhost:5432/coral_structural
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        # `temporalio-sdk` pulls `prost-wkt-types`, which needs `protoc` at build time.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install temporal CLI
        # `start-dev` ships in the Temporal CLI (`temporal` binary); statically
        # linked tarball release.
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          sudo install -m 0755 "$HOME/.temporalio/bin/temporal" /usr/local/bin/temporal
          temporal --version

      - name: Start Temporal dev server
        # `--headless` skips the Web UI; only the gRPC frontend on :7233 is needed.
        # `--log-level error` keeps the CI log small. The server runs in the
        # background; the runner's teardown kills it on job exit.
        run: |
          temporal server start-dev --headless --log-level error &
          # Poll the gRPC port until the server is listening (typical boot <2s);
          # cap at 30s so a stalled boot fails this step cleanly rather than
          # running into the workflow timeout.
          for i in $(seq 1 30); do
            if nc -z localhost 7233; then
              echo "temporal server reachable after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "temporal server did not become reachable in 30s" >&2
          exit 1

      - name: Run workflow smoke
        env:
          TEMPORAL_LIVE_TEST: "1"
        run: |
          mkdir -p ci-logs
          set -o pipefail
          cargo test --locked -p coral_temporal --test workflow_smoke -- --nocapture \
            2>&1 | tee ci-logs/workflow-smoke.log

      # Drives the same scripted-Decide sequence as `workflow_smoke` but routes
      # `AgentInput` + seed triggers through `coral_graph::yaml::{parse_and_validate,
      # into_agent_input, yaml_seed_triggers}` against
      # `examples/smoke_llm_temporal/graph.yaml`. The end-state assertion (same
      # three durable artifacts) pins the YAML's content to the fixture pair.
      # No Postgres dependency: the test skips `GraphStore::create_from_yaml`.
      - name: Run coral-apply smoke
        env:
          TEMPORAL_LIVE_TEST: "1"
          # `coral_graph` has compile-time-checked `sqlx::query!` macros via
          # `GraphStore`; route the compile through the `.sqlx/` cache so
          # cache-vs-live drift surfaces at `cargo sqlx prepare` time, not mid-CI.
          SQLX_OFFLINE: "true"
        run: |
          set -o pipefail
          cargo test --locked -p coral_graph --test coral_apply_smoke -- --nocapture \
            2>&1 | tee ci-logs/coral-apply-smoke.log

      # Per-test invocation rather than one bulk `cargo test` so a failure
      # surfaces as a distinct red step instead of a multi-thousand-line log.
      - name: Run spawn_child live
        env:
          TEMPORAL_LIVE_TEST: "1"
        run: |
          set -o pipefail
          cargo test --locked -p coral_temporal --test spawn_child_live -- --nocapture \
            2>&1 | tee ci-logs/spawn-child-live.log

      - name: Run child_parent_signal live
        env:
          TEMPORAL_LIVE_TEST: "1"
        run: |
          set -o pipefail
          cargo test --locked -p coral_temporal --test child_parent_signal -- --nocapture \
            2>&1 | tee ci-logs/child-parent-signal-live.log

      - name: Run reconcile_children live
        env:
          TEMPORAL_LIVE_TEST: "1"
        run: |
          set -o pipefail
          cargo test --locked -p coral_temporal --test reconcile_children_live -- --nocapture \
            2>&1 | tee ci-logs/reconcile-children-live.log

      - name: Run lifecycle_ops live
        env:
          TEMPORAL_LIVE_TEST: "1"
        run: |
          set -o pipefail
          cargo test --locked -p coral_temporal --test lifecycle_ops_live -- --nocapture \
            2>&1 | tee ci-logs/lifecycle-ops-live.log

      - name: Run multi_agent live
        env:
          TEMPORAL_LIVE_TEST: "1"
          # Route `coral_graph`'s compile-time `sqlx::query!` macros through
          # the `.sqlx/` cache; runtime still hits the service container.
          SQLX_OFFLINE: "true"
        run: |
          set -o pipefail
          cargo test --locked -p coral_graph --test multi_agent -- --nocapture \
            2>&1 | tee ci-logs/multi-agent-live.log

      # Exercises the production worker wiring: the real `GraphStore` installed
      # as the `StructuralDbStore`, driven through `Decision::SpawnChild`, with
      # the child `agents` + `edges` rows read back from the service Postgres.
      - name: Run spawn_child DB live
        env:
          TEMPORAL_LIVE_TEST: "1"
          # `coral_worker` pulls `coral_graph` (compile-time `sqlx::query!`);
          # route the build through the `.sqlx/` cache, runtime hits the service.
          SQLX_OFFLINE: "true"
        run: |
          set -o pipefail
          cargo test --locked -p coral_worker --test spawn_child_db_live -- --nocapture \
            2>&1 | tee ci-logs/spawn-child-db-live.log

      - name: Upload workflow smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: temporal-workflow-smoke-logs
          path: ci-logs/
