name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Single pin for the MCP reference server used by mcp-smoke and
  # runbook-smoke. The smoke_mcp fixture's hardcoded evidence id
  # (10c78548…) was computed against this version per JAR2-26's
  # timeline; bumping requires recomputing that sha.
  MCP_SERVER_EVERYTHING_VERSION: "2026.1.26"

jobs:
  lint-and-test:
    name: build / clippy / fmt / test
    runs-on: ubuntu-latest
    # JAR2-50: the `jarvis_graph` crate's `#[sqlx::test]`-based tests
    # need a live Postgres. The service container below brings one up
    # on `localhost:5432` matching the dev compose file's defaults so
    # `cargo test` can use the same `DATABASE_URL` shape locally and in
    # CI. Build still works without DATABASE_URL via the committed
    # `.sqlx/` offline cache (`cargo sqlx prepare --workspace`).
    services:
      postgres:
        image: postgres:16-alpine3.23
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: jarvis
          POSTGRES_DB: jarvis_structural
        ports:
          - 5432:5432
        # `sqlx::test` creates ephemeral per-test databases under the
        # connected role, so the role needs CREATEDB. The superuser the
        # image hands to POSTGRES_USER has it.
        options: >-
          --health-cmd "pg_isready -U jarvis -d jarvis_structural"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://jarvis:jarvis@localhost:5432/jarvis_structural
      # `SQLX_OFFLINE=true` is set at job scope so EVERY cargo
      # invocation uses the `.sqlx/` cache for the compile-time
      # query!/query_as! checks. The runtime side of `#[sqlx::test]`
      # still consults DATABASE_URL (the env var above), so the test
      # bodies hit the live service container. Holding both at job
      # scope keeps build / clippy / test consistent and avoids the
      # "test step silently recompiles against live DB" failure mode.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      # `temporalio-sdk` pulls `prost-wkt-types` which needs `protoc` at
      # build time. JAR2-41 added the SDK; this step is the workspace-level
      # consequence. Confirmed via the build-script error in CI run 26342189004.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  feature-matrix:
    name: feature matrix
    runs-on: ubuntu-latest
    # Same Postgres service container as the primary lint-and-test job:
    # `--workspace` test invocations include `jarvis_graph`, whose
    # `#[sqlx::test]` cases need a live DB. Build remains DB-free via
    # the `.sqlx/` offline cache.
    services:
      postgres:
        image: postgres:16-alpine3.23
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: jarvis
          POSTGRES_DB: jarvis_structural
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jarvis -d jarvis_structural"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://jarvis:jarvis@localhost:5432/jarvis_structural
      # See the matching note in the lint-and-test job: setting
      # SQLX_OFFLINE at job scope makes the compile-time query check
      # use the `.sqlx/` cache uniformly across build, clippy, and the
      # test compile, while `#[sqlx::test]` still uses DATABASE_URL at
      # runtime to talk to the service container.
      SQLX_OFFLINE: "true"
    strategy:
      matrix:
        include:
          - features: "jarvis_node/llm-anthropic"
            name: "llm-anthropic"
          - features: "jarvis_node/llm-cohere"
            name: "llm-cohere"
          - features: "jarvis_node/mcp"
            name: "mcp"
          - features: "jarvis_node/llm-anthropic,jarvis_node/llm-cohere,jarvis_node/mcp"
            name: "all features"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # Features live on `jarvis_node`, not the workspace. After the
      # JAR2-40 split, cross-crate selection takes the `<crate>/<feature>`
      # form from any workspace-aware invocation.
      - name: cargo build [${{ matrix.name }}]
        run: cargo build --workspace --all-targets --locked --features "${{ matrix.features }}"

      - name: cargo test [${{ matrix.name }}]
        run: cargo test --workspace --all-targets --locked --features "${{ matrix.features }}"

  mcp-smoke:
    # Activates tests/smoke_mcp_server_everything.rs, which is gated behind
    # JARVIS_SMOKE_MCP=1 and needs Node + a pinned server-everything on the
    # runner. See JAR2-34 and examples/smoke_mcp/README.md.
    name: mcp smoke (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke_mcp_server_everything against pinned server
        env:
          JARVIS_SMOKE_MCP: "1"
          JARVIS_SMOKE_MCP_CMD: "npx -y @modelcontextprotocol/server-everything@${{ env.MCP_SERVER_EVERYTHING_VERSION }}"
        run: |
          mkdir -p ci-logs
          set -o pipefail
          cargo test -p jarvis_node --features mcp --test smoke_mcp_server_everything --locked -- --nocapture \
            2>&1 | tee ci-logs/mcp-smoke.log

      - name: Upload mcp-smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-smoke-logs
          path: ci-logs/

  runbook-smoke:
    # Drives the user-facing runbook binaries (node-run + node-run-mcp) against
    # their committed fixtures and asserts on the durable artifacts they
    # produce (retirement.json, evidence/<sha>.json, outputs/<ulid>.json). See
    # JAR2-35.
    name: runbook binary smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run node-run against examples/smoke fixture
        run: |
          mkdir -p ci-logs
          set -o pipefail
          cargo run --locked -p jarvis_node --bin node-run -- \
            examples/smoke/config.json \
            examples/smoke/triggers.jsonl \
            "${RUNNER_TEMP}/jarvis-smoke-fs" \
            2>&1 | tee ci-logs/node-run.log

      - name: Assert node-run artifacts
        run: |
          bash scripts/ci/assert_smoke.sh \
            "${RUNNER_TEMP}/jarvis-smoke-fs" \
            "1d6a153a69d110156ca44ed281f859ca09d9875747e3ed16b9964c52632fd96e" \
            "echo" \
            '{"hello":"smoke"}' \
            "smoke test passed"

      - name: Run node-run-mcp against examples/smoke_mcp fixture
        run: |
          set -o pipefail
          cargo run --locked -p jarvis_node --features jarvis_node/mcp --bin node-run-mcp -- \
            examples/smoke_mcp/config.json \
            examples/smoke_mcp/triggers.jsonl \
            "${RUNNER_TEMP}/jarvis-smoke-mcp-fs" \
            -- npx -y "@modelcontextprotocol/server-everything@${MCP_SERVER_EVERYTHING_VERSION}" \
            2>&1 | tee ci-logs/node-run-mcp.log

      - name: Assert node-run-mcp artifacts
        run: |
          bash scripts/ci/assert_smoke.sh \
            "${RUNNER_TEMP}/jarvis-smoke-mcp-fs" \
            "10c7854829677f9d39acaafa5aa5ae4e9fa59ae5cba2a1dafc941c4c9f4938de" \
            "get-sum" \
            '{"a":2,"b":3}' \
            "get-sum(2, 3) via MCP server-everything"

      - name: Upload runbook smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runbook-smoke-artifacts
          path: |
            ci-logs/
            ${{ runner.temp }}/jarvis-smoke-fs/
            ${{ runner.temp }}/jarvis-smoke-mcp-fs/
